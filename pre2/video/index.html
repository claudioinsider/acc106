      .vsl-frame::before {
        content: "";
        position: absolute;
        inset: 0;

        pointer-events: none;
        z-index: 1;
        transition: opacity 0.4s ease;
      }
      .vsl-frame.is-ready {
        aspect-ratio: auto;
        background: transparent;
        contain: none;
        transform: none;
        will-change: auto;

      .vsl-frame.is-ready vturb-smartplayer {

    <!-- App -->
    <script>
      ;(function () {
        "use strict"

        /* ============================================================
         * Constantes
         * ============================================================ */

        var LEAD = "L1"
        var PITCH_MMSS = 4633
        var PITCH_MMSS = 4

        /* Detecção de ambiente — útil pra debug e ajustes específicos */
        var UA = navigator.userAgent || ""
        var IS_IOS = /iPad|iPhone|iPod/.test(UA) && !window.MSStream
        var IS_ANDROID = /Android/.test(UA)
        var IS_INAPP =
          /FBAN|FBAV|Instagram|TikTok|Line|Twitter|WeChat|MicroMessenger/i.test(
            UA,
          )

        // Adiciona classes no <html> pra estilos condicionais se precisar
        if (IS_IOS) document.documentElement.classList.add("ios")
        if (IS_ANDROID) document.documentElement.classList.add("android")
        if (IS_INAPP) document.documentElement.classList.add("inapp")

        /* ============================================================
         * 2. Player vturb — múltiplos eventos + fallback de 3s
         * ============================================================ */
        function setupPlayer() {
          var player = document.querySelector("vturb-smartplayer")
          var frame = document.getElementById("vsl-frame")
          if (!player) return

          var min = Math.floor(PITCH_MMSS / 100),
            sec = PITCH_MMSS % 100
          var delaySec = min * 60 + sec

          var revealed = false,
            pitched = false
          function reveal() {
            if (revealed) return
            revealed = true
            frame && frame.classList.add("is-ready")
          }
          function pitch() {
            if (pitched) return
            pitched = true
            if (typeof player.displayHiddenElements === "function") {
              player.displayHiddenElements(delaySec, [".esconder"], {
                persist: true,
              })
            }
            setTimeout(function () {
              var h = document.querySelector(".esconder")
              h && h.setAttribute("aria-hidden", "false")
            }, delaySec * 1000)
          }

          ;["player:ready", "player:loaded", "player:play", "play"].forEach(
            function (ev) {
              player.addEventListener(
                ev,
                function () {
                  reveal()
                  if (ev === "player:ready") pitch()
                },
                { passive: true },
              )
            },
          )

          if (player.shadowRoot) reveal()
          setTimeout(reveal, 3000)
          setTimeout(function () {
            if (!pitched) {
              var h = document.querySelector(".esconder")
              if (h) {
                h.style.display = "block"
                h.setAttribute("aria-hidden", "false")
              }
            }
          }, delaySec * 1000)
        }

        /* ============================================================
         * 5. Lead tracking — sub16 nos links de oferta apenas
         * ============================================================ */
        function setupLeads() {
          document
            .querySelectorAll("#bottles a, .smartplayer-click-event")
            .forEach(function (link) {
              link.addEventListener(
                "click",
                function () {
                  try {
                    var u = new URL(link.href)
                    u.searchParams.set("sub16", LEAD)
                    link.href = u.toString()
                  } catch (e) {}
                },
                { passive: true },
              )
            })
        }

        /* ============================================================
         * Bootstrap
         *    - postback: imediato (urgente, tracking)
         *    - comentários e player: imediato
         *    - listeners não-críticos: requestIdleCallback
         * ============================================================ */
        function idle(fn) {
          if ("requestIdleCallback" in window)
            requestIdleCallback(fn, { timeout: 1000 })
          else setTimeout(fn, 0)
        }

        function init() {
          setupPlayer()
          idle(setupLeads)
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", init, { once: true })
        } else {
          init()
        }
      })()
    </script>
